<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Timeline</title>

<style>
:root {
  --bg: #f6f7fb;
  --card: #fff;
  --muted: #6b7280;
  --accent: #1f6feb;
  --radius: 12px;
  --shadow: 0 4px 12px rgba(35, 40, 50, 0.08);
  font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

body {
  background: var(--bg);
  margin: 20px;
}

.layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 24px;
  max-width: 1100px;
  margin: auto;
}

.container {
  max-width: 800px;
}

.post {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 16px;
  display: flex;
  gap: 12px;
  box-shadow: var(--shadow);
}

.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.content {
  flex: 1;
  min-width: 0;
}

.meta {
  font-size: 13px;
  color: var(--muted);
}

.name {
  font-weight: 700;
  margin-right: 6px;
}

.text {
  margin-top: 6px;
  font-size: 15px;
  line-height: 1.4;
  white-space: pre-wrap;
  word-break: break-word;
}

.thumb {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
  display: block;
}

.actions {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  color: var(--muted);
}

.actions button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  font: inherit;
}

.actions button:hover {
  background: #f1f5f9;
}

.liked { color: #e0245e; }
.retweeted { color: #17bf63; }

.comment-box {
  margin-top: 10px;
  display: none;
}

.comment-box textarea {
  width: 100%;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  padding: 8px;
  font-size: 14px;
  box-sizing: border-box;
}

.comment-controls {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.comment-box button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
}

.emoji-panel {
  display: none;
  margin-top: 6px;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 6px;
  font-size: 20px;
}

.emoji-panel span {
  cursor: pointer;
  margin: 4px;
  display: inline-block;
}

.sidebar {
  position: sticky;
  top: 20px;
  align-self: start;
}

.widget {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.widget h3 {
  margin: 0 0 10px;
  font-size: 15px;
}

.search-widget input {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  box-sizing: border-box;
}

#trendingList {
  padding-left: 0;
  margin: 0;
}

#trendingList li {
  list-style: none;
  padding: 6px 0;
  font-weight: 600;
  color: #1f6feb;
  cursor: pointer;
}

#trendingList li:hover {
  text-decoration: underline;
}

.ai-summary {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #fffdf8;
  border: 1px solid #fbe5b3;
  font-size: 14px;
}

.ai-summary .label {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 8px;
}

.ai-choice-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

.ai-choice-btn {
  border: 2px solid #d4d8e1;
  background: white;
  color: #111827;
  border-radius: 999px;
  padding: 7px 12px;
  font-weight: 700;
  cursor: pointer;
  font-size: 13px;
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
}

.ai-choice-btn:hover {
  background: #f8fafc;
  transform: translateY(-1px);
}

.ai-choice-btn.grok {
  border-color: #7c3aed;
  background: #faf5ff;
}

.ai-choice-btn.claude {
  border-color: #d97706;
  background: #fffbeb;
}

.ai-choice-btn.selected {
  transform: scale(1.03);
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}

.ai-output {
  display: none;
  margin-top: 6px;
  padding: 10px;
  border-radius: 8px;
  background: #fff;
  border: 1px solid #e5e7eb;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
}

.ai-output.visible {
  display: block;
}

.ai-output .source {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #6b7280;
}

.view-link {
  display: inline-block;
  margin-top: 12px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
}

.view-link:hover {
  text-decoration: underline;
}

.empty-state {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
}
</style>
</head>

<body>

<div class="layout">
  <main class="container" id="timeline"></main>

  <aside class="sidebar">
    <div class="widget search-widget">
      <input id="searchInput" placeholder="Search posts" aria-label="Search posts">
    </div>

    <div class="widget">
      <h3>Trending</h3>
      <ul id="trendingList"></ul>
    </div>

    <div class="widget">
      <h3>Local Weather</h3>
      <div id="weather">Loading…</div>
    </div>
  </aside>
</div>

<script>
const EXP_CONDITION = "choice_ai";

const timeline = document.getElementById("timeline");
const searchInput = document.getElementById("searchInput");
const trendingList = document.getElementById("trendingList");
const weatherEl = document.getElementById("weather");

let timelineState = JSON.parse(sessionStorage.getItem("timelineState") || "{}");
function save() {
  sessionStorage.setItem("timelineState", JSON.stringify(timelineState));
}

let allPosts = [];
const timelineStart = Date.now();

function initials(name) {
  return String(name)
    .split(/\s+/)
    .map(w => w[0] || "")
    .join("")
    .slice(0, 2)
    .toUpperCase();
}

function colorFromName(name) {
  const colors = [
    "linear-gradient(135deg,#1f6feb,#3b82f6)",
    "linear-gradient(135deg,#10b981,#34d399)",
    "linear-gradient(135deg,#f59e0b,#fbbf24)",
    "linear-gradient(135deg,#ec4899,#f472b6)",
    "linear-gradient(135deg,#6366f1,#8b5cf6)"
  ];
  const first = String(name || "").charCodeAt(0) || 0;
  return colors[first % colors.length];
}

function sendHostMessage(type, payload = {}) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type, ...payload }, "*");
  }
}

function getAIContent(data, model) {
  if (data.ai && typeof data.ai === "object") {
    if (model === "grok" && data.ai.grok) return data.ai.grok;
    if (model === "claude" && data.ai.claude) return data.ai.claude;
    if (model === "fixed" && data.ai.fixed) return data.ai.fixed;
  }

  if (data.aiSummary) return data.aiSummary;
  return "AI context is not available for this post yet.";
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function renderAIBlock(data) {
  if (EXP_CONDITION === "no_ai") return "";

  if (EXP_CONDITION === "fixed_ai") {
    return `
      <div class="ai-summary" data-ai-block>
        <div class="label">AI Context</div>
        <div class="ai-choice-row">
          <button class="ai-choice-btn" data-ai-model="fixed">Generate context</button>
        </div>
        <div class="ai-output" aria-live="polite"></div>
      </div>
    `;
  }

  return `
    <div class="ai-summary" data-ai-block>
      <div class="label">Choose a source for extra context</div>
      <div class="ai-choice-row">
        <button class="ai-choice-btn grok" data-ai-model="grok">Grok</button>
        <button class="ai-choice-btn claude" data-ai-model="claude">Claude</button>
      </div>
      <div class="ai-output" aria-live="polite"></div>
    </div>
  `;
}

function attachAIHandlers(wrapper, data) {
  const buttons = wrapper.querySelectorAll("[data-ai-model]");
  const output = wrapper.querySelector(".ai-output");
  if (!buttons.length || !output) return;

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      const model = btn.getAttribute("data-ai-model");
      const content = getAIContent(data, model);
      const label = model === "grok" ? "Grok" : model === "claude" ? "Claude" : "AI";

      buttons.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");

      output.innerHTML = `
        <span class="source">${label}</span>
        <div>${escapeHtml(content)}</div>
      `;
      output.classList.add("visible");

      sendHostMessage("AI_BUTTON_CLICK", {
        postId: data.id,
        condition: EXP_CONDITION,
        model
      });
    });
  });
}

function renderTimeline(posts) {
  timeline.innerHTML = "";
  if (!posts.length) {
    timeline.innerHTML = `<div class="empty-state">No posts matched your search.</div>`;
    return;
  }
  posts.forEach(p => timeline.appendChild(createPost(p)));
}

function createPost(data) {
  const state = timelineState[data.id] ||= {
    likes: data.likes || 0,
    retweets: data.retweets || 0,
    comments: [],
    liked: false,
    retweeted: false
  };

  const wrapper = document.createElement("article");
  wrapper.className = "post";

  const repliesCount = Array.isArray(data.replies) ? data.replies.length : 0;
  const imageHtml = data.image ? `<img src="${escapeHtml(data.image)}" class="thumb" alt="Post image">` : "";

  wrapper.innerHTML = `
    <div class="avatar" style="background:${colorFromName(data.author)}">
      ${escapeHtml(initials(data.author))}
    </div>

    <div class="content">
      <div class="meta">
        <span class="name">${escapeHtml(data.author)}</span>
        ${escapeHtml(data.handle)} · ${escapeHtml(data.timestamp)}
      </div>

      <div class="text">${escapeHtml(data.text)}</div>

      ${imageHtml}

      ${renderAIBlock(data)}

      <div class="actions">
        <button class="like ${state.liked ? "liked" : ""}">❤️ <span>${state.likes}</span></button>
        <button class="retweet ${state.retweeted ? "retweeted" : ""}">🔁 <span>${state.retweets}</span></button>
        <button class="comment">💬 <span>${repliesCount + state.comments.length}</span></button>
      </div>

      <div class="comment-box">
        <textarea placeholder="Write a comment..."></textarea>

        <div class="comment-controls">
          <button class="emoji-toggle" type="button">😊</button>
          <button class="submit" type="button">Reply</button>
        </div>

        <div class="emoji-panel">
          <span>😀</span><span>😂</span><span>😊</span><span>😍</span>
          <span>🤔</span><span>😡</span><span>😢</span><span>👍</span>
          <span>👎</span><span>🎉</span><span>❤️</span><span>🔥</span>
        </div>
      </div>

      <a class="view-link" href="posts/post.html?id=${encodeURIComponent(data.id)}">View conversation →</a>
    </div>
  `;

  sendHostMessage("POST_VISIBLE", { postId: data.id, condition: EXP_CONDITION });

  wrapper.addEventListener("mouseenter", () => {
    sendHostMessage("USER_HOVER_POST", { postId: data.id });
  });

  wrapper.querySelector(".view-link").addEventListener("click", () => {
    sendHostMessage("POST_OPEN", { postId: data.id });
  });

  const likeBtn = wrapper.querySelector(".like");
  const rtBtn = wrapper.querySelector(".retweet");
  const commentBtn = wrapper.querySelector(".comment");
  const box = wrapper.querySelector(".comment-box");
  const ta = wrapper.querySelector("textarea");
  const submit = wrapper.querySelector(".submit");
  const emojiToggle = wrapper.querySelector(".emoji-toggle");
  const emojiPanel = wrapper.querySelector(".emoji-panel");

  likeBtn.addEventListener("click", () => {
    state.liked = !state.liked;
    state.likes += state.liked ? 1 : -1;
    likeBtn.classList.toggle("liked", state.liked);
    likeBtn.querySelector("span").textContent = state.likes;
    save();

    sendHostMessage("USER_LIKE", {
      postId: data.id,
      count: state.likes
    });
  });

  rtBtn.addEventListener("click", () => {
    state.retweeted = !state.retweeted;
    state.retweets += state.retweeted ? 1 : -1;
    rtBtn.classList.toggle("retweeted", state.retweeted);
    rtBtn.querySelector("span").textContent = state.retweets;
    save();

    sendHostMessage("USER_RETWEET", {
      postId: data.id,
      count: state.retweets
    });
  });

  commentBtn.addEventListener("click", () => {
    box.style.display = box.style.display === "block" ? "none" : "block";
    ta.focus();

    sendHostMessage("COMMENT_BOX_OPEN", { postId: data.id });
  });

  emojiToggle.addEventListener("click", () => {
    emojiPanel.style.display = emojiPanel.style.display === "block" ? "none" : "block";
  });

  emojiPanel.querySelectorAll("span").forEach(e => {
    e.addEventListener("click", () => {
      ta.value += e.textContent;
      ta.focus();
    });
  });

  submit.addEventListener("click", () => {
    const txt = ta.value.trim();
    if (!txt) return;

    state.comments.push(txt);
    ta.value = "";
    box.style.display = "none";
    commentBtn.querySelector("span").textContent = repliesCount + state.comments.length;
    save();

    sendHostMessage("USER_COMMENT", {
      postId: data.id,
      text: txt
    });
  });

  attachAIHandlers(wrapper, data);
  return wrapper;
}

fetch("./data/posts.json", { cache: "no-store" })
  .then(async r => {
    if (!r.ok) {
      throw new Error(`HTTP ${r.status} when loading ./data/posts.json`);
    }
    return r.json();
  })
  .then(posts => {
    if (!Array.isArray(posts)) {
      throw new Error("posts.json did not return an array.");
    }
    allPosts = posts;
    renderTimeline(posts);
  })
  .catch(async err => {
    console.error("Could not load posts:", err);
    timeline.innerHTML = `
      <div class="empty-state">
        <strong>Could not load posts.</strong>
        <div style="margin-top:8px;color:#6b7280;line-height:1.4;">
          Check that <code>data/posts.json</code> exists, the JSON is valid, and this page is being served from GitHub Pages rather than opened as a local file.
        </div>
      </div>
    `;

    try {
      const res = await fetch("./data/posts.json", { cache: "no-store" });
      const text = await res.text();
      console.log("Raw posts.json contents:", text);
    } catch (e) {
      console.error("Could not even read raw posts.json:", e);
    }
  });

let lastDepth = 0;
window.addEventListener("scroll", () => {
  const depth = Math.round(
    (window.scrollY + window.innerHeight) / document.body.scrollHeight * 100
  );

  if (depth !== lastDepth) {
    lastDepth = depth;
    sendHostMessage("SCROLL_DEPTH", { depth });
  }
});

window.addEventListener("beforeunload", () => {
  sendHostMessage("TIME_ON_TIMELINE", {
    ms: Date.now() - timelineStart
  });
});

searchInput.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  renderTimeline(
    allPosts.filter(p =>
      String(p.text || "").toLowerCase().includes(q) ||
      String(p.author || "").toLowerCase().includes(q) ||
      String(p.handle || "").toLowerCase().includes(q)
    )
  );
});

["#Shutdown", "#Trump", "#Kennedy", "#ICE", "#Congress"].forEach(tag => {
  const li = document.createElement("li");
  li.textContent = tag;

  li.addEventListener("click", () => {
    const query = tag.replace(/^#/, "").toLowerCase();
    searchInput.value = query;
    searchInput.dispatchEvent(new Event("input"));
  });

  trendingList.appendChild(li);
});

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`)
        .then(r => r.json())
        .then(d => {
          weatherEl.innerHTML =
            `<strong>${Math.round(d.current_weather.temperature)}°C</strong><br>Wind ${d.current_weather.windspeed} km/h`;
        })
        .catch(() => {
          weatherEl.textContent = "Weather unavailable.";
        });
    },
    () => {
      weatherEl.textContent = "Location blocked.";
    }
  );
} else {
  weatherEl.textContent = "Geolocation unavailable.";
}
</script>

</body>
</html>
